<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف الذكريات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f0f12; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .gallery-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 500px; }
        .gallery-item { background: #25252b; border-radius: 12px; overflow: hidden; aspect-ratio: 1/1; border: 1px solid #333; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>
    <h1 style="color: #f1c40f;">📸 أرشيف الذكريات</h1>
    <div class="gallery-container">
        <div class="gallery-item"><img src="1.jpg" alt="صورة 1"></div>
        <div class="gallery-item"><img src="2.jpg" alt="صورة 2"></div>
        <div class="gallery-item"><img src="3.jpg" alt="صورة 3"></div>
        <div class="gallery-item"><img src="4.jpg" alt="صورة 4"></div>
        <div class="gallery-item"><img src="5.jpg" alt="صورة 5"></div>
        <div class="gallery-item"><img src="6.jpg" alt="صورة 6"></div>
        <div class="gallery-item"><img src="7.jpg" alt="صورة 7"></div>
        <div class="gallery-item"><img src="8.jpg" alt="صورة 8"></div>
        <div class="gallery-item"><img src="9.jpg" alt="صورة 9"></div>
        <div class="gallery-item"><img src="10.jpg" alt="صورة 10"></div>
    </div>
    <br>
    <a href="index.html" style="color:#fff; text-decoration:none; font-weight:bold;">← العودة للرئيسية</a>
</body>
</html>
