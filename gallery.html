<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف الذكريات</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f0f12; color: #fff; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #f1c40f; font-size: 1.8rem; }
        .gallery-container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 500px; }
        .gallery-item { background: #1a1a1f; border-radius: 15px; overflow: hidden; border: 2px solid #333; aspect-ratio: 1/1; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .back-btn { margin-top: 30px; padding: 15px 30px; background: #25252b; color: #fff; text-decoration: none; border-radius: 12px; font-weight: bold; border: 1px solid #333; }
    </style>
</head>

        <div class="gallery-item"><img src="WhatsApp Image 2026-04-18 at 1.50.42 PM (6).jpeg" alt="ذكرى"></div>
