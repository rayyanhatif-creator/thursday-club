<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف الذكريات</title>
    <style>
        body { 
            background: #0f0f12; 
            color: #fff; 
            text-align: center; 
            font-family: sans-serif; 
            padding: 20px; 
            margin: 0;
        }
        h1 { color: #f1c40f; margin-bottom: 20px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            max-width: 600px; 
            margin: auto; 
        }
        .box { 
            aspect-ratio: 1/1; 
            overflow: hidden; 
            border-radius: 12px; 
            border: 2px solid #333; 
            background: #222; 
        }
        .box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }
        .footer { margin-top: 30px; }
        .footer a { color: #f1c40f; text-decoration: none; font-size: 1.2rem; }
    </style>
</head>
<body>

    <h1>📸 أرشيف الذكريات</h1>

    <div class="grid">
        <div class="box"><img src="images/1.jpeg" alt="صورة"></div>
        <div class="box"><img src="images/2.jpeg" alt="صورة"></div>
        <div class="box"><img src="images/3.jpeg" alt="صورة"></div>
        <div class="box"><img src="images/4.jpeg" alt="صورة"></div>
        <div class="box"><img src="images/5.jpeg" alt="صورة"></div>
        <div class="box"><img src="images/6.jpeg" alt="صورة"></div>
        <div class="box"><img src="images/7.jpeg" alt="صورة"></div>
        <div class="box"><img src="images/8.jpeg" alt="صورة"></div>
        <div class="box"><img src="images/9.jpeg" alt="صورة"></div>
        <div class="box"><img src="images/10.jpeg" alt="صورة"></div>
    </div>

    <div class="footer">
        <a href="index.html">← العودة للرئيسية</a>
    </div>

</body>
</html>
