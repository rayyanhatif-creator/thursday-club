<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>أرشيف الذكريات | مجلس الخميس</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: #0f0f12; 
            color: #ffffff; 
            margin: 0; 
            padding: 20px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
        }

        .header { text-align: center; margin-bottom: 30px; }
        .header h1 { color: #f1c40f; margin-bottom: 5px; font-size: 2rem; }
        .header p { color: #888; margin-top: 0; }

        .gallery-container { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            width: 100%; 
            max-width: 500px; 
            margin-bottom: 30px;
        }

        .gallery-item { 
            background: #1a1a1f; 
            border-radius: 15px; 
            overflow: hidden; 
            border: 2px solid #333; 
            aspect-ratio: 1 / 1; 
        }

        .gallery-item img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
        }

        .back-btn { 
            display: inline-block; 
            padding: 15px 30px; 
            background: #25252b; 
            color: #fff; 
            text-decoration: none; 
            border-radius: 12px; 
            font-weight: bold; 
            border: 1px solid #333; 
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>📸 أرشيف الذكريات</h1>
        <p>لقطاتنا وذكرياتنا في الخميس</p>
    </div>

    <div class="gallery-container">
        <div class="gallery-item"><img src="1.png" alt="ذكرى"></div>
        <div class="gallery-item"><img src="2.png" alt="ذكرى"></div>
        <div class="gallery-item"><img src="3.png" alt="ذكرى"></div>
        <div class="gallery-item"><img src="4.png" alt="ذكرى"></div>
        <div class="gallery-item"><img src="5.png" alt="ذكرى"></div>
        <div class="gallery-item"><img src="6.png" alt="ذكرى"></div>
        <div class="gallery-item"><img src="7.png" alt="ذكرى"></div>
        <div class="gallery-item"><img src="8.png" alt="ذكرى"></div>
        <div class="gallery-item"><img src="9.png" alt="ذكرى"></div>
        <div class="gallery-item"><img src="10.png" alt="ذكرى"></div>
    </div>

    <a href="index.html" class="back-btn">← العودة للرئيسية</a>

</body>
</html>
