<!DOCTYPE html>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📸 أرشيف الذكريات</title>

    <style>
        body { 
            background: #0f0f12; 
            color: #fff; 
            text-align: center; 
            font-family: 'Tajawal', sans-serif; 
            padding: 20px; 
            margin: 0;
        }

        h1 { 
            color: #f1c40f; 
            margin-bottom: 25px; 
        }

        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            max-width: 600px; 
            margin: auto; 
        }

        .box { 
            aspect-ratio: 1/1; 
            overflow: hidden; 
            border-radius: 15px; 
            border: 2px solid #333; 
            background: #222; 
            transition: 0.3s;
        }

        .box:hover {
            transform: scale(1.05);
        }

        .box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }

        .footer { 
            margin-top: 30px; 
        }

        .footer a { 
            color: #f1c40f; 
            text-decoration: none; 
            font-size: 1.2rem; 
        }
    </style>
</head>
