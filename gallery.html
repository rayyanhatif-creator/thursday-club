            padding: 20px; 
            margin: 0;
        }
        h1 { color: #f1c40f; margin-bottom: 20px; }
        .grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            max-width: 600px; 
            margin: auto; 
        }
        .box { 
            aspect-ratio: 1/1; 
            overflow: hidden; 
            border-radius: 12px; 
            border: 2px solid #333; 
            background: #222; 
        }
        .box img { 
            width: 100%; 
            height: 100%; 
            object-fit: cover; 
            display: block;
        }
        .footer { margin-top: 30px; }
        .footer a { color: #f1c40f; text-decoration: none; font-size: 1.2rem; }
    </style>
</head>
