<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ترتيب الأسر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f0f12; color: #fff; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: #1a1a1f; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; border-right: 5px solid #f1c40f; }
        h2 { color: #f1c40f; text-align: center; }
        table { width: 100%; margin-top: 20px; border-collapse: collapse; }
        td { padding: 15px; border-bottom: 1px solid #333; font-size: 1.1rem; }
        .back-btn { display: block; text-align: center; margin-top: 30px; color: #fff; text-decoration: none; font-weight: bold; }
    </style>
</head>
<body>
    <div class="card">
        <h2>ترتيب الأسر 🏆</h2>
        <table>
            <tr><td>👑 أسرة المجد</td><td>95</td></tr>
            <tr><td>🥈 أسرة الشرف</td><td>76</td></tr>
            <tr><td>🥉 أسرة العز</td><td>62</td></tr>
        </table>
        <a href="index.html" class="back-btn">← العودة للرئيسية</a>
    </div>
</body>
</html>
