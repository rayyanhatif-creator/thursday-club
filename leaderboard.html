<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ترتيب الأسر</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Tajawal', sans-serif; 
            background: #0f0f12; 
            color: #ffffff;
            margin: 0; min-height: 100vh;
            display: flex; justify-content: center; align-items: center; padding: 20px;
        }
        .card { 
            background: #1a1a1f; padding: 30px; border-radius: 20px; 
            width: 100%; max-width: 450px; border-right: 5px solid #f1c40f; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center;
        }
        h2 { color: #f1c40f; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th, td { padding: 15px; border-bottom: 1px solid #333; font-size: 1.1rem; }
        th { color: #888; }
        .back-btn { 
            display: block; margin-top: 30px; color: #fff; 
            text-decoration: none; font-weight: bold; padding: 10px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>ترتيب الأسر 🏆</h2>
        <table>
            <tr><th>الأسرة</th><th>النقاط</th></tr>
            <tr><td>👑 أسرة المجد</td><td>95</td></tr>
            <tr><td>🥈 أسرة الشرف</td><td>76</td></tr>
            <tr><td>🥉 أسرة العز</td><td>62</td></tr>
        </table>
        <a href="index.html" class="back-btn">← العودة للرئيسية</a>
    </div>
</body>
</html>
