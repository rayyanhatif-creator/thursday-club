<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>توقعات الخميس</title>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f0f12; color: #fff; padding: 20px; display: flex; justify-content: center; }
        .card { background: #1a1a1f; padding: 30px; border-radius: 20px; width: 100%; max-width: 500px; border-right: 5px solid #f1c40f; }
        h2 { color: #f1c40f; margin-bottom: 20px; text-align: center; }
        label { display: block; margin: 15px 0 5px; font-weight: bold; }
        textarea, input, select { 
            width: 100%; padding: 12px; background: #25252b; border: 1px solid #333; 
            border-radius: 8px; color: white; box-sizing: border-box; 
        }
        button { 
            margin-top: 25px; width: 100%; padding: 15px; background: #f1c40f; 
            border: none; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        button:hover { background: #d4ac0d; }
    </style>
</head>
<body>
    <div class="card" id="form-container">
        <h2>تحدي التوقعات 🔮</h2>
        <form id="predictionForm" onsubmit="showSuccess(event)">
            <label>🏆 من بيفوز بالتحدي الرياضي؟</label>
            <input type="text" placeholder="اكتب اسم الأسرة أو اللاعب..." required>
            
            <label>📚 وش تتوقع درس اليوم؟</label>
            <textarea rows="2" placeholder="اكتب توقعك للدرس..."></textarea>
            
            <label>🤔 هل فيه درس أصلاً؟</label>
            <select>
                <option>نعم، أكيد فيه درس 🤓</option>
                <option>لا، الخميس للوناسة فقط! 🍕</option>
                <option>مدري، بنشوف هناك!</option>
            </select>

            <label>✍️ مساحة التوقعات والحماس</label>
            <textarea rows="3" placeholder="اكتب أي شيء في خاطرك للطلعة..."></textarea>
            
            <button type="submit">أرسل توقعك 🔥</button>
        </form>
    </div>

    <script>
        function showSuccess(event) {
            event.preventDefault();
            const container = document.getElementById('form-container');
            container.innerHTML = `
                <div style="text-align:center; padding: 20px;">
                    <h2 style="color: #f1c40f;">رائع! وصلت توقعاتك 🚀</h2>
                    <p>متحمسين نشوف توقعاتك تتحقق في الطلعة!</p>
                    <a href="index.html" style="color: #3498db; text-decoration: none;">← العودة للرئيسية</a>
                </div>
            `;
        }
    </script>
</body>
</html>
