<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحدي التوقعات</title>
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f0f12; color: #fff; padding: 20px; display: flex; justify-content: center; }
        .card { background: #1a1a1f; padding: 25px; border-radius: 20px; width: 100%; max-width: 400px; border-right: 5px solid #f1c40f; }
        h2 { color: #f1c40f; text-align: center; }
        label { display: block; margin-top: 15px; font-weight: bold; }
        input, textarea, select { width: 100%; padding: 15px; margin-top: 5px; background: #25252b; border: 1px solid #333; border-radius: 10px; color: white; box-sizing: border-box; }
        button { margin-top: 25px; width: 100%; padding: 15px; background: #f1c40f; border: none; border-radius: 10px; font-weight: bold; font-size: 1rem; }
    </style>
</head>
<body>
    <div class="card">
        <h2>تحدي التوقعات 🔮</h2>
        <form>
            <label>🏆 الفايز بالرياضي؟</label>
            <input type="text" placeholder="اسم الأسرة...">
            <label>🧠 الفايز بالثقافي؟</label>
            <input type="text" placeholder="اسم الأسرة...">
            <label>📚 توقع الدرس؟</label>
            <textarea rows="2"></textarea>
            <button type="button" onclick="alert('رائع! وصلت توقعاتك 🚀')">أرسل التوقعات 🔥</button>
        </form>
    </div>
</body>
</html>
